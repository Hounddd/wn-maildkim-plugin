name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  phpUnitTests:
    name: ${{ matrix.operatingSystem }} / PHP ${{ matrix.phpVersion }}
    runs-on: ${{ matrix.operatingSystem }}
    strategy:
      max-parallel: 4
      matrix:
        operatingSystem: [ubuntu-latest, windows-latest]
        phpVersion: ['8.1', '8.2', '8.3', '8.4']
    steps:
      - name: Setup Winter
        uses: wintercms/setup-winter-action@v1
        with:
          php-version: ${{ matrix.phpVersion }}
          plugin-author: hounddd
          plugin-name: maildkim
      - name: Run linting
        run: ./vendor/bin/parallel-lint plugins/hounddd/maildkim

      - name: Run unit tests
        run: php artisan winter:test -p Hounddd.MailDkim